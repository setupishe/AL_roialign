mode: confidences
dataset_name: VOC
device: 0
ranges: [0.3, 0.4, 0.5, 0.6, 0.7]
bg2all_ratio: 0
prepare_script: conf_criteria.py
weights_base_path: /home/setupishe/ultralytics/runs/detect
split_name: confidences

prepare_args:
  cleanup: true

yolo_args:
  model: yolov8m.pt
  pretrained: "False"
  data: "${DATASET_NAME}_${next_range}_${split_name}.yaml"
  batch: 48
  name: "${DATASET_NAME}_${mode}_${next_range}"
  epochs: 65
  deterministic: "True"
