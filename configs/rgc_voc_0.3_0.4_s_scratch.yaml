# VOC RGC (miss_score oracle), yolov8s — from scratch (yolov8s.yaml, no pretrained)
# Step 0.3 → 0.4: prepare uses VOC_rgc_0.3_s_scratch weights; trains VOC_rgc_0.4_s_scratch
# Requires train_0.3_rgc_s_scratch.txt under the dataset root.

mode: rgc
dataset_name: VOC
device: 0
plots: false
ranges: [0.3, 0.4]
bg2all_ratio: 0
prepare_script: prepare_al_split.py
weights_base_path: /home/setupishe/ultralytics/runs/detect
first_weights_template: "${weights_base_path}/VOC_rgc_${range}_s_scratch/weights/best.pt"
weights_template: "${weights_base_path}/VOC_rgc_${range}_s_scratch/weights/best.pt"
split_name: rgc_s_scratch

prepare_args:
  rgc_batch_size: 32

yolo_args:
  model: yolov8s.yaml
  pretrained: "False"
  data: "VOC_${next_range}_${split_name}.yaml"
  imgsz: 640
  batch: 48
  epochs: 65
  seed: 0
  name: "VOC_rgc_${next_range}_s_scratch"
  device: "${device}"
